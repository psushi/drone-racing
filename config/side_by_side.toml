# Two-gate side-by-side eval layout.

[controller]
file = "controller_file_name_here.py"

[deploy]
check_race_track = false
check_drone_start_pos = false
real_track_objects = false

[[deploy.drones]]
id = 1
channel = 100
drone_model = "cf21B_500"

[sim]
physics = "so_rpy_rotor_drag"
drone_model = "cf21B_500"
camera_view = [5.0, 180.0, -25.0, 0.0, 0.0, 0.0]
freq = 500
attitude_freq = 500
render = false

[env]
id = "DroneRacing-v0"
seed = "random"
freq = 100
max_episode_steps = 500
sensor_range = 0.7
control_mode = "attitude"

[train]
clip_eps = 0.2
ent_coef = 0.005
gamma = 0.99
lambda_ = 0.95
lr = 0.0003
max_grad_norm = 0.5
num_envs = 128
num_epochs = 4
num_iterations = 2800
num_minibatches = 8
num_steps = 192
vf_coef = 0.5

[env.reset]
bank_path = "artifacts/low-cen-gate/reset_bank.npz"
bank_prob = 0.0
gate_indices = [0, 1]
gate_probs = [0.55, 0.45]
post_prev_distance_max = 0.95
post_prev_distance_min = 0.35
post_prev_prob = 0.7
post_prev_speed_max = 3.0
post_prev_speed_min = 1.5
pre_gate_speed = 0.0
yaw_jitter = 0.15

[env.reward]
ang_vel_penalty_scale = 0.004
crash_penalty = 5.0
gate_pass_bonus = 5.0
gate_width = 0.4
max_angular_speed = 25.0
max_linear_speed = 12.0
perception_distance_scale = 1.0
perception_weight = 0.35
progress_scale = 30.0
safety_activation_distance = 2.5
safety_weight = 1.5
vel_penalty_scale = 0.01

[env.track]
randomize = false

[[env.track.gates]]
pos = [0.7, 0.3, 0.7]
rpy = [0.0, 0.0, -1.57]

[[env.track.gates]]
pos = [0.7, -0.3, 0.7]
rpy = [0.0, 0.0, -1.57]

[[env.track.obstacles]]
pos = [2.4, 1.4, 1.55]

[[env.track.drones]]
pos = [-1.2, 0.0, 0.01]
rpy = [0.0, 0.0, 0.0]
vel = [0, 0, 0]
ang_vel = [0, 0, 0]

[env.track.safety_limits]
pos_limit_low = [-2.5, -1.5, -1e-3]
pos_limit_high = [2.5, 1.5, 2.0]

[env.track.gate_z_randomization]
min = 0.0
max = 0.0

[env.track.gate_yaw_randomization]
min = 0.0
max = 0.0

[env.track.gate_xy_randomization]
radius = 0.0

[env.disturbances.action]
fn = "normal"
scale = 0.001

[env.disturbances.dynamics]
fn = "uniform"

[env.disturbances.dynamics.kwargs]
minval = [-0.1, -0.1, -0.1]
maxval = [0.1, 0.1, 0.1]

[env.randomizations.drone_pos]
fn = "uniform"

[env.randomizations.drone_pos.kwargs]
minval = [-0.1, -0.1, 0.0]
maxval = [0.1, 0.1, 0.02]

[env.randomizations.drone_rpy]
fn = "uniform"

[env.randomizations.drone_rpy.kwargs]
minval = [-0.1, -0.1, -0.1]
maxval = [0.1, 0.1, 0.1]

[env.randomizations.drone_mass]
fn = "uniform"

[env.randomizations.drone_mass.kwargs]
minval = -0.005
maxval = 0.005

[env.randomizations.drone_inertia]
fn = "uniform"

[env.randomizations.drone_inertia.kwargs]
minval = [-0.000001, -0.000001, -0.000001]
maxval = [0.000001, 0.000001, 0.000001]
