# Randomized Intertial Properties

[controller]
file = "waypoint_controller.py"

[deploy]
check_race_track = false
check_drone_start_pos = false
real_track_objects = false

[[deploy.drones]]
id = 1
channel = 100
drone_model = "cf21B_500"

[train]
num_steps = 64
num_minibatches = 8
num_envs = 128
num_iterations = 1500
gamma = 0.99
lambda_ = 0.95
max_grad_norm = 0.5
lr = 0.0003
clip_eps = 0.2
vf_coef = 0.5
ent_coef = 0.02
num_epochs = 4

[sim]
physics = "so_rpy_rotor_drag"
drone_model = "cf21B_500"
camera_view = [5.0, 180.0, -25.0, 0.0, 0.0, 0.0]
freq = 500
attitude_freq = 500
render = true
pause = true

[env]
id = "DroneRacing-v0"
seed = "random"
freq = 100
sensor_range = 0.7
control_mode = "attitude"

[env.reward]
progress_scale = 20.0
safety_weight = 1.0
ang_vel_penalty_scale = 0.005
gate_width = 0.4
safety_activation_distance = 2.5
crash_penalty = 5.0
gate_pass_bonus = 5.0
vel_penalty_scale = 0.01

[env.reset]
gate_indices = [0, 1, 2, 3]
gate_probs = [0.45, 0.30, 0.17, 0.08]
post_prev_prob = 0.5

[env.track]
randomize = false

# Easier baseline track:
# - all gates at the same height
# - broader, oval/circular path instead of a square
# - gate yaw decreases smoothly around the loop to reduce harsh heading changes
[[env.track.gates]]
pos = [1.75, 0.15, 0.7]
rpy = [0.0, 0.0, -1.10]
[[env.track.gates]]
pos = [0.70, -1.30, 0.7]
rpy = [0.0, 0.0, -2.67]
[[env.track.gates]]
pos = [-1.00, -1.05, 0.7]
rpy = [0.0, 0.0, -4.24]
[[env.track.gates]]
pos = [-0.5, 0.75, 0.7]
rpy = [0.0, 0.0, -5.81]

[[env.track.obstacles]]
pos = [2.4, 1.4, 1.55]

[[env.track.drones]]
pos = [-1.5, 0.75, 0.01]
rpy = [0.0, 0.0, 0.0]
vel = [0, 0, 0]
ang_vel = [0, 0, 0]

[env.track.safety_limits]
pos_limit_low = [-2.5, -1.5, -1e-3]
pos_limit_high = [2.5, 1.5, 2.0]

[env.disturbances.action]
fn = "normal"
scale = 0.0

[env.disturbances.dynamics]
fn = "uniform"
[env.disturbances.dynamics.kwargs]
minval = [0.0, 0.0, 0.0]
maxval = [0.0, 0.0, 0.0]

[env.randomizations.drone_pos]
fn = "uniform"
[env.randomizations.drone_pos.kwargs]
minval = [-0.1, -0.1, 0.0]
maxval = [0.1, 0.1, 0.02]

[env.randomizations.drone_rpy]
fn = "uniform"
[env.randomizations.drone_rpy.kwargs]
minval = [-0.1, -0.1, -0.1]
maxval = [0.1, 0.1, 0.1]

[env.randomizations.drone_mass]
fn = "uniform"
[env.randomizations.drone_mass.kwargs]
minval = -0.005
maxval = 0.005

[env.randomizations.drone_inertia]
fn = "uniform"
[env.randomizations.drone_inertia.kwargs]
minval = [-0.000001, -0.000001, -0.000001]
maxval = [0.000001, 0.000001, 0.000001]
